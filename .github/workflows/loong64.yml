name: loong64
on:
  push:
    branches:
      - loong64-*
    tags:
      - release-loong64-*
  pull_request:
    branches:
      - loong64-*

env:
  KUBE_BASE_IMAGE_REGISTRY: ${{ vars.KUBE_BASE_IMAGE_REGISTRY || 'kubernetesloong64' }}

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:13
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Print branch name
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "${{ github.base_ref }} (PR target)"
          else
            echo ${{ github.ref_name }}
          fi
      - name: Extract gitlab-runner branch
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REF=${{ github.base_ref }}
          else
            REF=${{ github.ref_name }}
          fi
          echo "REF=$REF"
          RAW_VERSION=$(echo $REF | awk -F'loong64-' '{print $2}')
          echo "RAW_VERSION=$RAW_VERSION"
          echo "RAW_VERSION=$RAW_VERSION" >> ${GITHUB_ENV}
          echo "RAW_VERSION=$RAW_VERSION" >> ${GITHUB_OUTPUT}
          GITLAB_RUNNER_BRANCH=$(echo $RAW_VERSION | awk -F'+' '{print $1}')
          echo "GITLAB_RUNNER_BRANCH=$GITLAB_RUNNER_BRANCH"
          echo "GITLAB_RUNNER_BRANCH=$GITLAB_RUNNER_BRANCH" >> ${GITHUB_ENV}
          echo "GITLAB_RUNNER_BRANCH=$GITLAB_RUNNER_BRANCH" >> ${GITHUB_OUTPUT}
          RELEASE=$(echo $RAW_VERSION | awk -F'+' '{print $2}')
          RELEASE=${RELEASE:-alpha.${{ github.run_number }}}
          echo "RELEASE=$RELEASE"
          echo "RELEASE=$RELEASE" >> ${GITHUB_ENV}
          echo "RELEASE=$RELEASE" >> ${GITHUB_OUTPUT}
          if echo "$RAW_VERSION" | grep -qE '[+].*(alpha|beta|rc)'; then
            IS_STABLE=false
          else
            IS_STABLE=true
          fi
          echo "IS_STABLE=$IS_STABLE"
          echo "IS_STABLE=$IS_STABLE" >> ${GITHUB_OUTPUT}
      - name: Install build tools
        run: |
          apt update
          apt install -y git make golang file jq
      - name: Clone gitlab-runner
        run: |
          git clone --branch ${{ env.GITLAB_RUNNER_BRANCH }} --depth 1 https://gitlab.com/gitlab-org/gitlab-runner.git gitlab-runner
      - name: ls
        run: ls -lah
      - name: Install Docker CLI
        run: |
          apt remove $(dpkg --get-selections docker.io docker-compose docker-doc podman-docker containerd runc | cut -f1)
          apt update
          apt install -y ca-certificates curl
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          # Add the repository to Apt sources:
          tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/debian
          Suites: $(. /etc/os-release && echo "$VERSION_CODENAME")
          Components: stable
          Architectures: $(dpkg --print-architecture)
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF
          apt update
          apt install -y docker-ce-cli
      - name: Verify Docker installation
        run: |
          ls -la /run/docker.sock 2>/dev/null || echo "/run/docker.sock not found"
          echo "DOCKER_HOST=$DOCKER_HOST"
          docker info
      #- name: Apply patches
      #  working-directory: gitlab-runner
      #  run: git apply ../*.patch
      - name: Build gitlab-runner-helper
        working-directory: gitlab-runner
        env:
          GOOS: linux
          GOARCH: loong64
          ARCH_TAG: loongarch64
          BASE_IMAGE: kubernetesloong64/runner-tools-base-images-loong64:v0.0.47-debian
        run: |
          echo "=== Build gitlab-runner-helper ==="
          echo "GOOS=$GOOS GOARCH=$GOARCH ARCH_TAG=$ARCH_TAG BASE_IMAGE=$BASE_IMAGE"
          IMAGE_REF=${{ env.KUBE_BASE_IMAGE_REGISTRY }}/gitlab-runner-helper:$ARCH_TAG-${{ env.GITLAB_RUNNER_BRANCH }}
          IMAGE_REF_LOONG64=${{ env.KUBE_BASE_IMAGE_REGISTRY }}/gitlab-runner-helper-loong64:$ARCH_TAG-${{ env.GITLAB_RUNNER_BRANCH }}
          echo "Target: $IMAGE_REF"
          echo "IMAGE_REF=$IMAGE_REF"
          echo "IMAGE_REF=$IMAGE_REF" >> ${GITHUB_ENV}
          echo "Target: $IMAGE_REF_LOONG64"
          echo "IMAGE_REF_LOONG64=$IMAGE_REF_LOONG64"
          echo "IMAGE_REF_LOONG64=$IMAGE_REF_LOONG64" >> ${GITHUB_ENV}
          make helper-bin-linux
          echo "=== Binary output ==="
          find out -type f | xargs ls -lh
          echo "=== Docker images before build ==="
          docker images
          docker build \
              --build-arg BASE_IMAGE=$BASE_IMAGE \
              --build-arg TARGETOS=$GOOS \
              --build-arg TARGETARCH=$GOARCH \
              --build-context binary_dir=out/binaries/gitlab-runner-helper \
              -f dockerfiles/runner-helper/Dockerfile \
              -t $IMAGE_REF \
              -t $IMAGE_REF_LOONG64 \
              .
          echo "=== Docker images after build ==="
          docker images
          echo "=== Saving $IMAGE_REF ==="
          docker save -o gitlab-runner-helper-loong64.tar $IMAGE_REF
          echo "=== Image tarball ==="
          ls -lha gitlab-runner-helper-loong64.tar
          echo "=== Manifest ==="
          echo "--- repositories ---"
          tar -xOf gitlab-runner-helper-loong64.tar repositories
          echo "--- manifest.json ---"
          tar -xOf gitlab-runner-helper-loong64.tar manifest.json | jq
          echo "--- config ---"
          tar -xOf gitlab-runner-helper-loong64.tar $(tar -xOf gitlab-runner-helper-loong64.tar manifest.json | jq -r '.[0].Config') | jq
          echo "--- os, architecture ---"
          tar -xOf gitlab-runner-helper-loong64.tar $(tar -xOf gitlab-runner-helper-loong64.tar manifest.json | jq -r '.[0].Config') | jq '{os, architecture}'
      - name: Print binary SHA-256 checksums
        working-directory: gitlab-runner
        run: |
          find out -type f | xargs sha256sum
      - name: Inspect binary file types
        working-directory: gitlab-runner
        run: |
          echo "=== bin ==="
          file out/binaries/gitlab-runner-helper/*
      - name: Upload gitlab-runner-helper binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gitlab-runner-helper-loong64-binaries
          path: gitlab-runner/out/binaries/gitlab-runner-helper/gitlab-runner-helper.linux-loong64
      - name: Upload gitlab-runner-helper image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gitlab-runner-helper-loong64-images
          path: gitlab-runner/gitlab-runner-helper-loong64.tar
      - name: Login to Docker
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push image
        run: |
          docker push $IMAGE_REF
          docker push $IMAGE_REF_LOONG64
